<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Token Visualizer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;
  --bg2:#f5f5f5;
  --bg3:#ebebeb;
  --border:#e0e0e0;
  --border2:#cccccc;
  --text:#1a1a1a;
  --text2:#555555;
  --text3:#888888;
  --accent:#0066cc;
  --accent-bg:#e8f0fe;
  --sidebar-w:280px;
  --detail-w:320px;
  --header-h:56px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --mono:'SF Mono','Fira Code',monospace;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* HEADER */
header{height:var(--header-h);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:16px;padding:0 20px;flex-shrink:0;background:var(--bg)}
.logo{font-size:14px;font-weight:600;letter-spacing:-0.02em}
.logo span{color:var(--text3);font-weight:400}
.brand-tabs{display:flex;gap:2px;background:var(--bg2);border-radius:8px;padding:3px}
.brand-tab{padding:5px 14px;font-size:12px;font-weight:500;border-radius:6px;border:none;background:transparent;color:var(--text2);cursor:pointer;transition:all 0.15s}
.brand-tab.active{background:var(--bg);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.1)}
.search-wrap{margin-left:auto;position:relative}
.search-wrap input{width:220px;height:32px;border:1px solid var(--border);border-radius:8px;padding:0 10px 0 32px;font-size:13px;background:var(--bg2);color:var(--text);outline:none}
.search-wrap input:focus{border-color:var(--accent);background:var(--bg)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px;pointer-events:none}
.token-count{font-size:12px;color:var(--text3);white-space:nowrap}

/* LAYOUT */
.layout{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
aside{width:var(--sidebar-w);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;background:var(--bg)}
.filter-section{padding:12px 16px;border-bottom:1px solid var(--border)}
.filter-label{font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--text3);margin-bottom:8px}
.filter-pills{display:flex;flex-wrap:wrap;gap:4px}
.pill{padding:4px 10px;font-size:11px;border-radius:20px;border:1px solid var(--border);background:var(--bg);color:var(--text2);cursor:pointer;transition:all 0.1s;white-space:nowrap}
.pill:hover{border-color:var(--border2)}
.pill.active{background:var(--text);color:var(--bg);border-color:var(--text)}
.type-pill{display:flex;align-items:center;gap:5px}
.type-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* TOKEN LIST */
.token-list{flex:1;overflow-y:auto}
.token-group{border-bottom:1px solid var(--border)}
.token-group-header{padding:8px 16px;font-size:10px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--text3);background:var(--bg2);position:sticky;top:0;z-index:1;display:flex;justify-content:space-between;align-items:center}
.token-group-count{font-weight:400;opacity:.6}
.token-item{display:flex;align-items:center;gap:10px;padding:8px 16px;cursor:pointer;border-bottom:1px solid var(--border);transition:background 0.1s}
.token-item:hover{background:var(--bg2)}
.token-item.selected{background:var(--accent-bg)}
.token-item-preview{width:28px;height:28px;border-radius:6px;flex-shrink:0;border:1px solid var(--border);overflow:hidden;display:flex;align-items:center;justify-content:center}
.token-item-info{flex:1;min-width:0}
.token-item-name{font-size:11px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.token-item-value{font-size:10px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:var(--mono)}

/* MAIN */
main{flex:1;overflow-y:auto;padding:20px}
.main-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
.main-grid.wide{grid-template-columns:repeat(auto-fill,minmax(240px,1fr))}

/* TOKEN CARD */
.token-card{border:1px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:all 0.15s;background:var(--bg)}
.token-card:hover{border-color:var(--border2);box-shadow:0 2px 8px rgba(0,0,0,.06)}
.token-card.selected{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-bg)}
.card-preview{height:80px;display:flex;align-items:center;justify-content:center;background:var(--bg2)}
.card-preview.color-preview{height:72px}
.card-info{padding:8px 10px}
.card-name{font-size:10px;color:var(--text2);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-value{font-size:11px;color:var(--text);font-weight:500;font-family:var(--mono);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-ref{font-size:10px;color:var(--accent);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* PREVIEWS */
.space-bar{background:#0066cc;border-radius:2px;height:10px}
.radius-box{width:48px;height:48px;border:2px solid var(--border2);background:var(--bg)}
.opacity-box{width:48px;height:48px;border-radius:8px;background:var(--text)}
.typo-sample{font-family:var(--font);color:var(--text);line-height:1.2}
.font-family-sample{font-size:20px;color:var(--text);font-weight:500}
.checker{background-image:repeating-conic-gradient(#ccc 0% 25%,white 0% 50%);background-size:12px 12px;position:absolute;inset:0;border-radius:inherit}

/* DETAIL PANEL */
.detail-panel{width:var(--detail-w);border-left:1px solid var(--border);flex-shrink:0;display:flex;flex-direction:column;overflow:hidden;transition:width 0.2s;background:var(--bg)}
.detail-panel.hidden{width:0;border:none}
.detail-header{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.detail-close{width:24px;height:24px;border:none;background:var(--bg2);border-radius:6px;cursor:pointer;font-size:14px;color:var(--text2);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.detail-close:hover{background:var(--bg3)}
.detail-path{font-size:12px;font-weight:600;color:var(--text);line-height:1.4;word-break:break-all}
.detail-body{flex:1;overflow-y:auto;padding:16px}
.detail-preview{width:100%;height:100px;border-radius:10px;border:1px solid var(--border);overflow:hidden;display:flex;align-items:center;justify-content:center;margin-bottom:16px;background:var(--bg2);position:relative}
.detail-section{margin-bottom:16px}
.detail-section-label{font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--text3);margin-bottom:8px}
.detail-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:500}
.detail-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px}
.detail-row-label{font-size:11px;color:var(--text3);min-width:70px;flex-shrink:0;padding-top:1px}
.detail-row-value{font-size:11px;color:var(--text);font-family:var(--mono);word-break:break-all;flex:1}
.ref-chain{display:flex;flex-direction:column;gap:4px}
.ref-arrow{font-size:11px;color:var(--text3);padding-left:12px}
.ref-item{font-size:11px;font-family:var(--mono);padding:4px 8px;background:var(--bg2);border-radius:4px;word-break:break-all}
.ref-item.is-ref{color:var(--accent)}
.ref-item.is-value{color:var(--text)}
.used-by-list{display:flex;flex-direction:column;gap:3px}
.used-by-item{font-size:11px;font-family:var(--mono);color:var(--accent);cursor:pointer;padding:3px 6px;border-radius:4px;transition:background .1s}
.used-by-item:hover{background:var(--accent-bg)}
.empty-state{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-state p{font-size:13px}

/* TYPE COLORS */
.t-color{background:#ffd6d6;color:#990000}
.t-spacing{background:#d6f5d6;color:#006600}
.t-sizing{background:#d6e8ff;color:#003399}
.t-typography{background:#f0d6ff;color:#660099}
.t-borderRadius{background:#fff3d6;color:#996600}
.t-opacity{background:#e0e0e0;color:#444444}
.t-other{background:#f0f0f0;color:#555555}

/* SCROLLBAR */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#aaa}

/* EMPTY */
.no-results{text-align:center;padding:40px;color:var(--text3);font-size:13px;grid-column:1/-1}
</style>
</head>
<body>

<header>
  <div class="logo">Token Visualizer <span>/ Carentan · Railyard</span></div>
  <div class="brand-tabs">
    <button class="brand-tab active" onclick="setBrand('all')">All</button>
    <button class="brand-tab" onclick="setBrand('carentan')">Carentan</button>
    <button class="brand-tab" onclick="setBrand('railyard')">Railyard</button>
    <button class="brand-tab" onclick="setBrand('global')">Global</button>
  </div>
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="text" id="search" placeholder="Search tokens..." oninput="render()">
  </div>
  <span class="token-count" id="count"></span>
</header>

<div class="layout">
  <aside>
    <div class="filter-section">
      <div class="filter-label">Layer</div>
      <div class="filter-pills" id="layer-pills"></div>
    </div>
    <div class="filter-section">
      <div class="filter-label">Type</div>
      <div class="filter-pills" id="type-pills"></div>
    </div>
    <div class="token-list" id="token-list"></div>
  </aside>

  <main id="main">
    <div class="main-grid" id="grid"></div>
  </main>

  <div class="detail-panel hidden" id="detail-panel">
    <div class="detail-header">
      <div class="detail-path" id="detail-path"></div>
      <button class="detail-close" onclick="closeDetail()">✕</button>
    </div>
    <div class="detail-body" id="detail-body"></div>
  </div>
</div>

// State
let activeBrand = 'all';
let activeLayer = 'all';
let activeType = 'all';
let selectedToken = null;

// Token map for lookups
const TOKEN_MAP = {};
TOKENS.forEach(t => TOKEN_MAP[t.path] = t);

// Type config
const TYPE_CONFIG = {
  color: { label: 'Color', dot: '#ff6b6b', cls: 't-color' },
  spacing: { label: 'Spacing', dot: '#51cf66', cls: 't-spacing' },
  sizing: { label: 'Sizing', dot: '#339af0', cls: 't-sizing' },
  typography: { label: 'Typography', dot: '#cc5de8', cls: 't-typography' },
  fontSizes: { label: 'Font sizes', dot: '#cc5de8', cls: 't-typography' },
  fontWeights: { label: 'Font weights', dot: '#cc5de8', cls: 't-typography' },
  fontFamilies: { label: 'Font family', dot: '#cc5de8', cls: 't-typography' },
  lineHeights: { label: 'Line height', dot: '#cc5de8', cls: 't-typography' },
  letterSpacing: { label: 'Letter spacing', dot: '#cc5de8', cls: 't-typography' },
  textCase: { label: 'Text case', dot: '#cc5de8', cls: 't-typography' },
  borderRadius: { label: 'Border radius', dot: '#ffd43b', cls: 't-borderRadius' },
  borderWidth: { label: 'Border width', dot: '#ffd43b', cls: 't-borderRadius' },
  opacity: { label: 'Opacity', dot: '#aaa', cls: 't-opacity' },
  boxShadow: { label: 'Shadow', dot: '#aaa', cls: 't-opacity' },
};

function typeConf(type) {
  return TYPE_CONFIG[type] || { label: type, dot: '#ccc', cls: 't-other' };
}

// Resolve reference chain
function resolveRef(value, visited = new Set()) {
  if (typeof value !== 'string') return { chain: [], resolved: value };
  if (!value.startsWith('{') || !value.endsWith('}')) return { chain: [], resolved: value };
  const refPath = value.slice(1, -1);
  if (visited.has(refPath)) return { chain: [refPath], resolved: null };
  visited.add(refPath);
  const refToken = TOKEN_MAP[refPath];
  if (!refToken) return { chain: [refPath], resolved: null };
  const { chain, resolved } = resolveRef(refToken.value, visited);
  return { chain: [refPath, ...chain], resolved };
}

function getResolvedValue(token) {
  if (typeof token.value === 'string' && token.value.startsWith('{')) {
    const { resolved } = resolveRef(token.value);
    return resolved;
  }
  return token.value;
}

function isRef(value) {
  return typeof value === 'string' && value.startsWith('{') && value.endsWith('}');
}

// Color preview
function isValidColor(v) {
  if (!v) return false;
  return /^#[0-9a-fA-F]{3,8}$/.test(v) || v.startsWith('rgb') || v.startsWith('hsl');
}

function isLight(hex) {
  if (!hex || !hex.startsWith('#')) return true;
  const h = hex.length === 4
    ? hex[1]+hex[1]+hex[2]+hex[2]+hex[3]+hex[3]
    : hex.slice(1);
  const r = parseInt(h.slice(0,2),16);
  const g = parseInt(h.slice(2,4),16);
  const b = parseInt(h.slice(4,6),16);
  return (r*299+g*587+b*114)/1000 > 128;
}

// Render preview HTML
function renderPreviewEl(token, size = 'card') {
  const type = token.type;
  const val = token.value;
  const resolved = getResolvedValue(token);
  const big = size === 'detail';

  if (type === 'color') {
    const color = isValidColor(resolved) ? resolved : (isValidColor(val) ? val : '#ccc');
    const light = isLight(color);
    return `<div style="position:relative;width:100%;height:100%;">
      <div class="checker"></div>
      <div style="position:absolute;inset:0;background:${color};"></div>
    </div>`;
  }

  if (type === 'spacing' || type === 'sizing') {
    const px = parseFloat(resolved || val) || 0;
    const maxW = big ? 200 : 100;
    const w = Math.min(Math.max(px, 2), maxW);
    const label = `${px}px`;
    return `<div style="display:flex;flex-direction:column;align-items:flex-start;gap:6px;padding:12px;width:100%">
      <div class="space-bar" style="width:${w}px;${big?'height:14px':''}"></div>
      <span style="font-size:11px;color:var(--text2);font-family:var(--mono)">${label}</span>
    </div>`;
  }

  if (type === 'borderRadius') {
    const px = parseFloat(resolved || val) || 0;
    const r = px >= 9999 ? '50%' : `${px}px`;
    const s = big ? 72 : 48;
    return `<div class="radius-box" style="width:${s}px;height:${s}px;border-radius:${r}"></div>`;
  }

  if (type === 'opacity') {
    const op = parseFloat(resolved || val) / (String(resolved||val).includes('%') ? 100 : 1);
    const s = big ? 56 : 40;
    return `<div class="opacity-box" style="width:${s}px;height:${s}px;opacity:${op}"></div>`;
  }

  if (type === 'fontSizes') {
    const px = Math.min(parseFloat(val) || 16, big ? 48 : 32);
    return `<div class="typo-sample" style="font-size:${px}px">Aa</div>`;
  }

  if (type === 'fontFamilies') {
    return `<div class="font-family-sample" style="font-family:'${val}',sans-serif">${val}</div>`;
  }

  if (type === 'typography') {
    if (typeof val === 'object') {
      const fs = TOKEN_MAP[val.fontSize?.slice?.(1,-1)]?.value || '16';
      const fw = val.fontWeight?.includes?.('{') ? '700' : (val.fontWeight || '400');
      const ff = val.fontFamily?.includes?.('{')
        ? (TOKEN_MAP[val.fontFamily.slice(1,-1)]?.value || 'sans-serif')
        : val.fontFamily || 'sans-serif';
      const px = Math.min(parseFloat(fs)||16, big?40:28);
      return `<div class="typo-sample" style="font-size:${px}px;font-weight:${fw};font-family:'${ff}',sans-serif">Aa — ${ff}</div>`;
    }
  }

  if (type === 'fontWeights') {
    return `<div class="typo-sample" style="font-size:${big?28:20}px;font-weight:${val==='Bold'?700:400}">Aa</div>`;
  }

  if (type === 'boxShadow') {
    return `<div style="width:${big?60:44}px;height:${big?60:44}px;background:var(--bg);box-shadow:0 2px 8px rgba(0,0,0,.15);border-radius:8px"></div>`;
  }

  return `<div style="font-size:${big?14:12}px;color:var(--text2);font-family:var(--mono);padding:8px;text-align:center;word-break:break-all">${typeof val==='object'?JSON.stringify(val).slice(0,40)+'…':String(val)}</div>`;
}

// Sidebar preview (small icon)
function renderSidebarPreview(token) {
  const type = token.type;
  const val = token.value;
  const resolved = getResolvedValue(token);

  if (type === 'color') {
    const color = isValidColor(resolved) ? resolved : (isValidColor(val) ? val : '#ccc');
    return `<div style="position:relative;width:100%;height:100%;border-radius:5px;overflow:hidden">
      <div class="checker" style="border-radius:5px"></div>
      <div style="position:absolute;inset:0;background:${color};border-radius:5px"></div>
    </div>`;
  }
  if (type === 'spacing' || type === 'sizing') {
    const px = Math.min(parseFloat(resolved||val)||0, 20);
    return `<div style="width:${Math.max(px,2)}px;height:6px;background:#339af0;border-radius:2px"></div>`;
  }
  if (type === 'borderRadius') {
    const px = parseFloat(resolved||val)||0;
    const r = px>=9999?'50%':`${px}px`;
    return `<div style="width:18px;height:18px;border:2px solid #888;border-radius:${r}"></div>`;
  }
  if (type === 'opacity') {
    const op = parseFloat(resolved||val)/(String(resolved||val).includes('%')?100:1);
    return `<div style="width:18px;height:18px;border-radius:4px;background:var(--text);opacity:${op}"></div>`;
  }
  const tc = typeConf(type);
  return `<div style="width:100%;height:100%;background:${tc.dot};border-radius:5px;opacity:0.3"></div>`;
}

// Get filtered tokens
function getFiltered() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  return TOKENS.filter(t => {
    if (activeBrand !== 'all' && t.brand !== activeBrand) return false;
    if (activeLayer !== 'all' && t.layer !== activeLayer) return false;
    if (activeType !== 'all') {
      const typeGroup = getTypeGroup(t.type);
      if (typeGroup !== activeType) return false;
    }
    if (q && !t.path.toLowerCase().includes(q) && !String(t.value).toLowerCase().includes(q)) return false;
    return true;
  });
}

function getTypeGroup(type) {
  const typoTypes = ['typography','fontSizes','fontWeights','fontFamilies','lineHeights','letterSpacing','textCase'];
  if (typoTypes.includes(type)) return 'typography';
  const spaceTypes = ['spacing','sizing'];
  if (spaceTypes.includes(type)) return 'spacing';
  const borderTypes = ['borderRadius','borderWidth'];
  if (borderTypes.includes(type)) return 'border';
  return type;
}

// Get unique type groups
function getTypeGroups() {
  const groups = new Set();
  TOKENS.forEach(t => groups.add(getTypeGroup(t.type)));
  return [...groups].sort();
}

// Group tokens by prefix for sidebar
function groupTokens(tokens) {
  const groups = {};
  tokens.forEach(t => {
    const prefix = t.path.split('.').slice(0,2).join('.');
    if (!groups[prefix]) groups[prefix] = [];
    groups[prefix].push(t);
  });
  return groups;
}

// Render
function render() {
  const filtered = getFiltered();
  document.getElementById('count').textContent = `${filtered.length} tokens`;

  // Token list sidebar
  const groups = groupTokens(filtered);
  const listEl = document.getElementById('token-list');
  listEl.innerHTML = Object.entries(groups).map(([group, tokens]) => `
    <div class="token-group">
      <div class="token-group-header">
        ${group} <span class="token-group-count">${tokens.length}</span>
      </div>
      ${tokens.map(t => `
        <div class="token-item ${selectedToken?.path===t.path?'selected':''}"
             onclick="selectToken('${t.path}')">
          <div class="token-item-preview">${renderSidebarPreview(t)}</div>
          <div class="token-item-info">
            <div class="token-item-name">${t.path.split('.').slice(-2).join('.')}</div>
            <div class="token-item-value">${isRef(t.value)?t.value:String(t.value).slice(0,20)}</div>
          </div>
        </div>
      `).join('')}
    </div>
  `).join('');

  // Main grid
  const gridEl = document.getElementById('grid');
  const hasWide = activeType === 'typography' || activeType === 'spacing';
  gridEl.className = 'main-grid' + (hasWide ? ' wide' : '');

  if (filtered.length === 0) {
    gridEl.innerHTML = '<div class="no-results">No tokens found</div>';
    return;
  }

  gridEl.innerHTML = filtered.map(t => {
    const tc = typeConf(t.type);
    const rawVal = typeof t.value === 'object' ? JSON.stringify(t.value).slice(0,30)+'…' : String(t.value);
    const ref = isRef(t.value) ? `→ ${t.value.slice(1,-1)}` : '';
    return `<div class="token-card ${selectedToken?.path===t.path?'selected':''}"
                 onclick="selectToken('${t.path}')">
      <div class="card-preview color-preview">${renderPreviewEl(t)}</div>
      <div class="card-info">
        <div class="card-name">${t.path}</div>
        <div class="card-value">${rawVal}</div>
        ${ref ? `<div class="card-ref">${ref}</div>` : ''}
      </div>
    </div>`;
  }).join('');
}

function setBrand(brand) {
  activeBrand = brand;
  document.querySelectorAll('.brand-tab').forEach((el,i) => {
    el.classList.toggle('active', ['all','carentan','railyard','global'][i] === brand);
  });
  render();
}

function setLayer(layer) {
  activeLayer = layer;
  renderPills();
  render();
}

function setType(type) {
  activeType = type;
  renderPills();
  render();
}

function renderPills() {
  const layers = ['all','primitive','semantic','component'];
  document.getElementById('layer-pills').innerHTML = layers.map(l =>
    `<button class="pill ${activeLayer===l?'active':''}" onclick="setLayer('${l}')">${l==='all'?'All':l.charAt(0).toUpperCase()+l.slice(1)}</button>`
  ).join('');

  const types = ['all', ...getTypeGroups()];
  document.getElementById('type-pills').innerHTML = types.map(type => {
    if (type === 'all') return `<button class="pill ${activeType==='all'?'active':''}" onclick="setType('all')">All</button>`;
    const tc = typeConf(type);
    return `<button class="pill type-pill ${activeType===type?'active':''}" onclick="setType('${type}')">
      <span class="type-dot" style="background:${tc.dot}"></span>${tc.label||type}
    </button>`;
  }).join('');
}

function selectToken(path) {
  const token = TOKEN_MAP[path];
  if (!token) return;
  selectedToken = token;
  showDetail(token);
  render();
}

function closeDetail() {
  selectedToken = null;
  document.getElementById('detail-panel').classList.add('hidden');
  render();
}

function showDetail(token) {
  const panel = document.getElementById('detail-panel');
  panel.classList.remove('hidden');

  document.getElementById('detail-path').textContent = token.path;

  const tc = typeConf(token.type);
  const resolved = getResolvedValue(token);
  const { chain } = isRef(token.value) ? resolveRef(token.value) : { chain: [] };

  // Badge color
  const brandColor = token.brand === 'carentan' ? '#e80064' : token.brand === 'railyard' ? '#9250ee' : '#555';

  // Build ref chain HTML
  let refChainHtml = '';
  if (chain.length > 0) {
    refChainHtml = `<div class="ref-chain">
      <div class="ref-item is-ref">${token.value}</div>
      ${chain.map((r,i) => `
        <div class="ref-arrow">↓</div>
        <div class="ref-item ${i===chain.length-1&&!TOKEN_MAP[r]?.value?.startsWith?.('{')?' is-value':' is-ref'}">${r}</div>
      `).join('')}
      ${resolved && resolved !== chain[chain.length-1] ? `
        <div class="ref-arrow">↓</div>
        <div class="ref-item is-value">${typeof resolved==='object'?JSON.stringify(resolved):resolved}</div>
      ` : ''}
    </div>`;
  }

  // Typography details
  let typoDetails = '';
  if (token.type === 'typography' && typeof token.value === 'object') {
    const v = token.value;
    const props = ['fontFamily','fontWeight','fontSize','lineHeight','letterSpacing','textCase'];
    typoDetails = `<div class="detail-section">
      <div class="detail-section-label">Properties</div>
      ${props.filter(p=>v[p]).map(p => {
        const val = v[p];
        const res = isRef(val) ? (TOKEN_MAP[val.slice(1,-1)]?.value || val) : val;
        return `<div class="detail-row">
          <span class="detail-row-label">${p}</span>
          <span class="detail-row-value">${res}${isRef(val)?` <span style="color:var(--text3)">(${val})</span>`:''}
          </span>
        </div>`;
      }).join('')}
    </div>`;
  }

  // Used by
  const usedByHtml = token.usedBy.length > 0
    ? `<div class="detail-section">
        <div class="detail-section-label">Used by (${token.usedBy.length})</div>
        <div class="used-by-list">
          ${token.usedBy.slice(0,20).map(p => `<div class="used-by-item" onclick="selectToken('${p}')">${p}</div>`).join('')}
          ${token.usedBy.length>20?`<div style="font-size:11px;color:var(--text3);padding:4px 6px">+${token.usedBy.length-20} more</div>`:''}
        </div>
      </div>`
    : '';

  document.getElementById('detail-body').innerHTML = `
    <div class="detail-preview">${renderPreviewEl(token, 'detail')}</div>

    <div class="detail-section">
      <div class="detail-section-label">Info</div>
      <div class="detail-row">
        <span class="detail-row-label">Type</span>
        <span class="detail-badge ${tc.cls}">${token.type}</span>
      </div>
      <div class="detail-row">
        <span class="detail-row-label">Layer</span>
        <span class="detail-row-value">${token.layer}</span>
      </div>
      <div class="detail-row">
        <span class="detail-row-label">Brand</span>
        <span class="detail-row-value" style="color:${brandColor};font-weight:500">${token.brand}</span>
      </div>
      ${token.description ? `<div class="detail-row">
        <span class="detail-row-label">Note</span>
        <span class="detail-row-value" style="font-family:var(--font)">${token.description}</span>
      </div>` : ''}
    </div>

    <div class="detail-section">
      <div class="detail-section-label">Value</div>
      <div class="detail-row">
        <span class="detail-row-label">Raw</span>
        <span class="detail-row-value">${typeof token.value==='object'?JSON.stringify(token.value,null,2):token.value}</span>
      </div>
      ${resolved && resolved !== token.value ? `<div class="detail-row">
        <span class="detail-row-label">Resolved</span>
        <span class="detail-row-value">${typeof resolved==='object'?JSON.stringify(resolved):resolved}</span>
      </div>` : ''}
    </div>

    ${chain.length > 0 ? `<div class="detail-section">
      <div class="detail-section-label">Reference chain</div>
      ${refChainHtml}
    </div>` : ''}

    ${typoDetails}
    ${usedByHtml}
  `;
}

// Init
renderPills();
render();
</script>
</body>
</html>
